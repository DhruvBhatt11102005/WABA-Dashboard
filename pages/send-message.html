<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send Message &mdash; WABA Dashboard</title>
  <meta name="description" content="Compose and send WhatsApp messages"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css?v=7"/>
  <script>window.PAGES_PREFIX = '../';</script>
  <style>
    .split-layout {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 24px;
    }
    
    /* Phone Preview */
    .phone-mockup {
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      background: #efeae2;
      border: 8px solid #d1d7db;
      border-radius: 36px;
      height: 600px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .phone-header {
      background: #f0f2f5;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #111b21;
      font-size: 15px;
      font-weight: 500;
    }
    .phone-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .phone-body {
      flex: 1;
      background: #efeae2 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      background-size: cover;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    .chat-bubble {
      background: #d9fdd3;
      color: #111b21;
      padding: 8px 12px;
      border-radius: 8px;
      border-top-right-radius: 0;
      max-width: 85%;
      align-self: flex-end;
      font-size: 14.2px;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
    }
    .chat-bubble::before {
      content: '';
      position: absolute;
      top: 0;
      right: -8px;
      border-top: 8px solid #d9fdd3;
      border-right: 8px solid transparent;
      border-bottom: 8px solid transparent;
    }
    .bubble-meta {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      font-size: 11px;
      color: rgba(0,0,0,0.6);
    }
    .phone-input {
      background: #f0f2f5;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .phone-input-box {
      flex: 1;
      background: #d1d7db;
      border-radius: 20px;
      padding: 10px 16px;
      color: #54656f;
      font-size: 14px;
    }
    
    @media (max-width: 900px) {
      .split-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout" id="app-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="breadcrumb">
            <span>Dashboard</span>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">Send Message</span>
          </div>
        </div>
        <div class="header-right">
          <div class="live-clock">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="live-clock-time" class="live-clock-time">--:--:--</span>
          </div>
          <button class="header-btn" title="Notifications">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="notif-dot"></span>
          </button>
          <div class="header-avatar" title="EE Admin">EE</div>
        </div>
      </header>
      <main class="page-content">
        
        <div class="page-header animate-fadeInUp">
          <svg class="wave-bg" style="position:absolute; bottom:0; left:0; width:100%; height:70px; z-index:0; pointer-events:none;" viewBox="0 0 1440 320" preserveAspectRatio="none"><path class="wave-path wave-path-1" fill="#e2dff8" fill-opacity="0.42" d="M 0 180 C 180 120, 360 260, 540 180 C 720 120, 900 260, 1080 180 C 1260 120, 1440 260, 1620 180 C 1800 120, 1980 260, 2160 180 C 2340 120, 2520 260, 2700 180 C 2880 120, 3060 260, 3240 180 L 3240 320 L 0 320 Z"></path><path class="wave-path wave-path-2" fill="#edeaf8" fill-opacity="0.50" d="M 0 210 C 180 260, 360 150, 540 210 C 720 260, 900 150, 1080 210 C 1260 260, 1440 150, 1620 210 C 1800 260, 1980 150, 2160 210 C 2340 260, 2520 150, 2700 210 C 2880 260, 3060 150, 3240 210 L 3240 320 L 0 320 Z"></path></svg>
          <div>
            <h1 class="page-title">Send Message</h1>
            <p class="page-desc">Compose &amp; send WhatsApp messages</p>
          </div>
        </div>

        <div class="split-layout">
          <!-- Left: Form -->
          <div class="card animate-fadeInUp animate-delay-1">
            <div class="form-group">
              <label class="form-label">Select Device</label>
              <select class="form-select">
                <option>+91 98765 43210 - Primary Business</option>
                <option>+91 87654 32109 - Support Line</option>
              </select>
            </div>
            
            <div class="form-group">
              <label class="form-label">Recipient Number</label>
              <input type="text" class="form-input" placeholder="+91 XXXXX XXXXX" id="recipient-input" />
              <div class="form-hint">Include country code without '+' if preferred.</div>
            </div>
            
            <div class="form-group">
              <label class="form-label">Message Type</label>
              <div class="tabs">
                <button class="tab-btn active" id="type-text">Text</button>
                <button class="tab-btn" id="type-template">Template</button>
                <button class="tab-btn" id="type-media">Media</button>
              </div>
            </div>
            
            <div class="form-group">
              <div class="flex justify-between items-center mb-2">
                <label class="form-label mb-0">Message Body</label>
                <span class="status" id="char-count" style="background:var(--bg-glass);color:var(--text-muted)">0 / 1024</span>
              </div>
              <textarea class="form-textarea" id="message-input" placeholder="Type your message here..."></textarea>
            </div>
            
            <div class="form-group" style="padding: 16px; background: var(--bg-glass); border-radius: var(--radius-md); border: 1px solid var(--border);">
              <div class="flex justify-between items-center">
                <div>
                  <div style="font-size:14px;font-weight:600;color:var(--text-primary);">Schedule Message</div>
                  <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Send later instead of immediately</div>
                </div>
                <label class="toggle">
                  <input type="checkbox" id="schedule-toggle" />
                  <div class="toggle-slider"></div>
                </label>
              </div>
              
              <div id="schedule-input-container" style="display:none; margin-top:16px;">
                <input type="datetime-local" class="form-input" id="schedule-datetime" />
              </div>
            </div>
            
            <button class="btn-primary w-full" id="send-btn" style="justify-content:center; padding:14px; font-size:15px; margin-top:10px;">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
              Send Message
            </button>
          </div>
          
          <!-- Right: Preview -->
          <div class="card animate-fadeInUp animate-delay-2" style="background: var(--bg-secondary);">
            <div class="flex justify-between items-center mb-6">
              <div class="card-title">Live Preview</div>
              <div class="live-badge">
                <span class="live-dot"></span> Live
              </div>
            </div>
            
            <div class="phone-mockup">
              <div class="phone-header">
                <div class="phone-avatar">
                  <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div id="preview-contact">Recipient</div>
              </div>
              <div class="phone-body">
                <div class="chat-bubble" id="preview-bubble" style="display:none;">
                  <span id="preview-text"></span>
                  <div class="bubble-meta">
                    <span id="preview-time">10:42 AM</span>
                    <svg width="16" height="15" viewBox="0 0 16 15" fill="none">
                      <path d="M15.01 3.316l-8.57 8.57a.7.7 0 01-.99 0l-4.29-4.29a.7.7 0 01.99-.99l3.79 3.79 8.08-8.08a.7.7 0 01.99.99z" fill="#53bdeb"/>
                    </svg>
                  </div>
                </div>
              </div>
              <div class="phone-input">
                <div class="phone-input-box">Message</div>
                <div style="width:36px;height:36px;border-radius:50%;background:#005bb5;display:flex;align-items:center;justify-content:center;color:#fff;">
                  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><polyline points="12 9 12 12 13.5 13.5"/></svg>
                </div>
              </div>
            </div>
          </div>
          
        </div>

      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const msgInput = document.getElementById('message-input');
      const charCount = document.getElementById('char-count');
      const previewBubble = document.getElementById('preview-bubble');
      const previewText = document.getElementById('preview-text');
      const previewTime = document.getElementById('preview-time');
      const schedToggle = document.getElementById('schedule-toggle');
      const schedInput = document.getElementById('schedule-input-container');
      const recipientInput = document.getElementById('recipient-input');
      const previewContact = document.getElementById('preview-contact');
      const sendBtn = document.getElementById('send-btn');
      
      const MAX_CHARS = 1024;
      
      // Real-time message update
      msgInput.addEventListener('input', () => {
        const text = msgInput.value;
        const len = text.length;
        
        charCount.textContent = `${len} / ${MAX_CHARS}`;
        if(len > MAX_CHARS) {
          charCount.style.color = '#ef4444';
          charCount.style.background = 'rgba(239,68,68,0.1)';
        } else {
          charCount.style.color = 'var(--text-muted)';
          charCount.style.background = 'var(--bg-glass)';
        }
        
        if (text.trim() === '') {
          previewBubble.style.display = 'none';
        } else {
          previewBubble.style.display = 'block';
          // Convert line breaks to <br> for HTML preview
          previewText.innerHTML = text.replace(/\n/g, '<br>');
          
          // Update time
          const now = new Date();
          previewTime.textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }
      });
      
      // Recipient update
      recipientInput.addEventListener('input', () => {
        previewContact.textContent = recipientInput.value.trim() || 'Recipient';
      });
      
      // Schedule toggle
      schedToggle.addEventListener('change', () => {
        schedInput.style.display = schedToggle.checked ? 'block' : 'none';
        if(schedToggle.checked) {
          sendBtn.innerHTML = `
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Schedule Message
          `;
        } else {
          sendBtn.innerHTML = `
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            Send Message
          `;
        }
      });
      
      // Tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
        });
      });
      
      // Mock Send Action
      sendBtn.addEventListener('click', () => {
        if(!msgInput.value.trim()) {
          window.showToast('Please enter a message to send', 'error');
          return;
        }
        const action = schedToggle.checked ? 'scheduled' : 'sent';
        window.showToast(`Message ${action} successfully!`, 'success');
        msgInput.value = '';
        msgInput.dispatchEvent(new Event('input')); // trigger char count reset
      });
    });
  </script>
  <script src="../js/animations.js"></script>
</body>
</html>
